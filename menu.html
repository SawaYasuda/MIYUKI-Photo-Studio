<!doctype html>

    <!-- リセットCSS -->

  </head>

  <body>
    <div class="sub-cover cover-menu">

        <h1 class="align-center">

        <div class="btn-mail">

              class="icon"

        <a
          class="item-gallery"
          href="images/weddingdresses.jpg"

        <a class="item-gallery" href="images/model.jpg" data-aos="fade-up">
          <img src="images/model.jpg" alt="宣材写真" />
        </a>
        <p>宣材写真</p>

        <a class="item-gallery" href="images/temple.jpg" data-aos="fade-up">

      <div class="copyright">
        <small>&copy; 2026 MIYUKI Photo Studio</small>
      </div>

  <!-- JavaScript -->
  <script>
    const btn = document.querySelector(".btn-menu");
    const nav = document.querySelector(".main-nav");

    btn.addEventListener("click", () => {
      nav.classList.toggle("open-menu");
      if (btn.innerHTML === "≡") {
        btn.innerHTML = "×";
      } else {
        btn.innerHTML = "≡";
      }
    });
  </script>

  <!-- JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/luminous-lightbox/2.3.2/luminous.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

  <script>
    new LuminousGallery(document.querySelectorAll(".item-gallery"));
    AOS.init();
  </script>
