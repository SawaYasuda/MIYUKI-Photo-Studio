<!doctype html>
<html lang="ja">
  <head>

      name="description"
      content="プロの撮影でスタジオ写真を撮ってみませんか"
    />

    <!-- viewportの設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ファビコン -->
    <link rel="icon" type="image/png" href="images/logo.png" />

    <!-- リセットCSS -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />

    <!-- Googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho&display=swap"
      rel="stylesheet"
    />

    <!-- オリジナルCSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- OGP -->
  </head>

  <body>
    <div class="sub-cover cover-contact">
      <header class="page-header wrapper">
        <h1 class="align-center">
          <a href="index.html"
            ><img class="logo" src="images/logo.png" alt="みゆき写真館 ホーム"
          /></a>
        </h1>
        <nav>
          <button class="btn-menu">≡</button>
          <ul class="main-nav font-english">
            <li><a href="menu.html">撮影メニュー</a></li>
            <li><a href="price.html">料金</a></li>
            <li><a href="faq.html">よくある質問</a></li>
          </ul>
        </nav>
        <div class="btn contact-btn">
          <a href="contact.html">お問い合わせ ＞</a>
        </div>
      </header>
      <h2 class="page-title font-english title-back">お問い合わせ</h2>
    </div>

    <main>
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSc5H17mBgpIFPDAXbk2_B8AGnDr4Xr3KyAK1hBT0js8oLT0VA/viewform?embedded=true"
        width="640"
        height="1200"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        >読み込んでいます…</iframe
      >
    </main>

    <footer class="page-footer">
      <h3 class="heading-large font-english">アクセス・店舗情報</h3>
      <div class="wrapper">
        <section class="location">
          <div class="location-info">
            <table class="info">
              <tr>
                <th>住所</th>
                <td>東京都港区六本木 0-0 ◯◯◯</td>
              </tr>
              <tr>
                <th>電話</th>
                <td>03-1111-XXXX</td>
              </tr>
              <tr>
                <th>営業時間</th>
                <td>10:00〜20:00</td>
              </tr>
              <tr>
                <th>店休日</th>
                <td>水曜</td>
              </tr>
            </table>
          </div>
          <div class="location-map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12960.64377114398!2d139.67745349999998!3d35.6976569!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6018f30062b6db45%3A0x89b5334c71797387!2z5qCq5byP5Lya56S-RyZUIOS4remHjuWdguS4iuagoQ!5e0!3m2!1sja!2sjp!4v1774934433952!5m2!1sja!2sjp"
              width="720"
              height="320"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </section>
      </div>

      <div class="copyright">
        <small>&copy; 2026 MIYUKI Photo Studio</small>
      </div>
    </footer>
  </body>

  <script>
    const btn = document.querySelector(".btn-menu");
    const nav = document.querySelector(".main-nav");

    btn.addEventListener("click", () => {
      nav.classList.toggle("open-menu");
      if (btn.innerHTML === "≡") {
        btn.innerHTML = "×";
      } else {
        btn.innerHTML = "≡";
      }
    });
  </script>
</html>
